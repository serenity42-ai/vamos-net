<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" fill="none">
  <!-- Vamos text - heavy weight dark navy -->
  <text x="0" y="128" font-family="'Inter', 'Arial Black', sans-serif" font-weight="900" font-size="140" fill="#0F1F2E" letter-spacing="-2">V</text>
  <text x="95" y="128" font-family="'Inter', 'Arial Black', sans-serif" font-weight="900" font-size="140" fill="#0F1F2E" letter-spacing="-2">am</text>
  <!-- O is replaced by ball - skip space for it -->
  <text x="368" y="128" font-family="'Inter', 'Arial Black', sans-serif" font-weight="900" font-size="140" fill="#0F1F2E" letter-spacing="-2">s</text>
  
  <!-- Ball (replacing O) -->
  <circle cx="330" cy="90" r="48" fill="#B8D430"/>
  <circle cx="330" cy="90" r="48" fill="url(#ballGrad)"/>
  <!-- Ball seam -->
  <path d="M295 60 C310 85, 350 95, 365 120" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Ball texture hints -->
  <circle cx="330" cy="90" r="47" stroke="#7A9E00" stroke-width="1" fill="none" opacity="0.3"/>
  
  <!-- .NET text - thin weight -->
  <text x="440" y="128" font-family="'Inter', Arial, sans-serif" font-weight="300" font-size="120" fill="#0F1F2E" letter-spacing="1" opacity="0.7">.</text>
  <text x="468" y="128" font-family="'Inter', Arial, sans-serif" font-weight="300" font-size="120" fill="#0F1F2E" letter-spacing="2" opacity="0.7">NET</text>
  
  <defs>
    <radialGradient id="ballGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#C4E020"/>
      <stop offset="100%" stop-color="#8AB300"/>
    </radialGradient>
  </defs>
</svg>
